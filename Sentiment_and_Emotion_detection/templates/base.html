<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>InsightFlow • AI Sentiment & Emotion Analyzer</title>

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Google Fonts: Space Grotesk + Manrope -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- AOS Animation Library -->
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <style>
    :root {
      --primary: #6366f1;
      --primary-light: #818cf8;
      --secondary: #ec4899;
      --accent: #f59e0b;
      --success: #10b981;
      --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      --gradient-4: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
    }

    body {
      font-family: 'Manrope', sans-serif;
      background: #0f0f1e;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .hero-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(120, 219, 226, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(255, 119, 198, 0.2) 0%, transparent 50%);
      z-index: -1;
      animation: float 20s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-30px) rotate(1deg); }
    }

    .brand-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 3.5rem;
      font-weight: 700;
      background: linear-gradient(90deg, #a855f7, #3b82f6, #10b981, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(168, 85, 247, 0.3);
    }

    .glass-nav {
      background: rgba(15, 15, 30, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 2rem;
      padding: 1rem 2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .nav-btn {
      position: relative;
      border-radius: 1.5rem;
      padding: 1rem 2rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 0.95rem;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: none;
    }

    .nav-btn::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--gradient-1);
      opacity: 0;
      transition: opacity 0.4s;
      z-index: -1;
    }

    .nav-btn:hover::before { opacity: 1; }
    .nav-btn:hover { transform: translateY(-8px) scale(1.05); box-shadow: 0 20px 40px rgba(99, 102, 241, 0.4); }

    .nav-btn.active {
      background: var(--gradient-1);
      color: white;
      box-shadow: 0 15px 35px rgba(99, 102, 241, 0.5);
      transform: translateY(-4px);
    }

    .content-card {
      background: rgba(20, 20, 40, 0.7);
      backdrop-filter: blur(16px);
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .pulse-glow {
      animation: pulse 3s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(168, 85, 247, 0.4); }
      50% { box-shadow: 0 0 40px rgba(168, 85, 247, 0.8); }
    }
  </style>
</head>
<body>

  <div class="hero-bg"></div>

  <div class="container py-5">
    <!-- Hero Title -->
    <div class="text-center mb-5" data-aos="zoom-in">

      <p class="lead text-white-50 fs-3 fw-light">Advanced Approaches in Sentiment Classification:
 From Feature Selection to Emotion Detection
</p>
    </div>

    <!-- Navigation Pills -->
    <div class="glass-nav mx-auto mb-5" style="max-width: 1000px;" data-aos="fade-up" data-aos-delay="200">
      <div class="d-flex flex-wrap justify-content-center gap-3">
        <a href="{% url 'home' %}" 
           class="btn nav-btn text-white {% if request.resolver_match.url_name == 'home' %}active{% else %}btn-outline-light border-white{% endif %}">
          <i class="bi bi-house-door-fill"></i> Home
        </a>
        <a href="{% url 'preprocess' %}" 
           class="btn nav-btn text-white {% if request.resolver_match.url_name == 'preprocess' %}active{% else %}btn-outline-light border-white{% endif %}">
          <i class="bi bi-wand"></i> Preprocess
        </a>
        <a href="{% url 'visualize' %}" 
           class="btn nav-btn text-white {% if request.resolver_match.url_name == 'visualize' %}active{% else %}btn-outline-light border-white{% endif %}">
          <i class="bi bi-graph-up-arrow"></i> Visualize
        </a>
        <a href="{% url 'classify' %}" 
           class="btn nav-btn text-white {% if request.resolver_match.url_name == 'classify' %}active{% else %}btn-outline-light border-white{% endif %}">
          <i class="bi bi-brain"></i> Classify
        </a>
      </div>
    </div>

    <!-- Main Content -->
    <div class="content-card p-5" data-aos="fade-up" data-aos-delay="400">
      {% block content %}
      {% endblock %}
    </div>

    <!-- Floating Elements -->
    <div class="position-fixed top-50 start-0 translate-middle-y">
      <div class="fs-1 text-primary opacity-10 animate__animated animate__fadeInLeft animate__slow animate__infinite">&#9679;</div>
    </div>
    <div class="position-fixed top-50 end-0 translate-middle-y">
      <div class="fs-1 text-pink opacity-10 animate__animated animate__fadeInRight animate__slow animate__infinite">&#11044;</div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 1000, once: false });
  </script>
</body>
</html>
